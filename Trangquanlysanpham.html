<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body {
            display: flex;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #343a40;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background: #495057;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4>Admin</h4>
        <a href="Trangquanlysanpham.html">Quản lý sản phẩm</a>
        <a href="TrangQuanlydonhang.html">Quản lý đơn hàng</a>
        <a href="TrangQuanlynguodung.html">Quản lý người dùng</a>
        <a href="TrangDoanhthu.html">Thống kê doanh thu</a>
        <button type="button" class="btn btn-outline-secondary">
            <a href="TrangHome.html" style="color: inherit; text-decoration: none;">Về Trang Chủ</a>
        </button>
    </div>
    <div class="content">
        <h2 class="mb-4">Quản lý sản phẩm</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                <!-- Dữ liệu sẽ được thêm bằng jQuery -->
            </tbody>
        </table>
    </div>
    
    <script>
        $(document).ready(function () {
            let products = [
                { id: 201, name: "Ốp Lưng IPhone", price: "420.000 VNĐ", quantity: 50 },
                { id: 202, name: "Ốp Lưng Galaxy A35", price: "330.000 VNĐ", quantity: 30 },
                { id: 203, name: "Ốp Lưng Samsung", price: "345.000 VNĐ", quantity: 20 },
                { id: 204, name: "Pin Dự Phòng Polymer", price: "200.000 VNĐ", quantity: 40 },
                { id: 205, name: "oa Bluetooth Mini Sony", price: "1.000.000 VNĐ", quantity: 60 },
                { id: 206, name: "Tai Nghe Chùm Đầu", price: "425.000 VNĐ", quantity: 25 },
                { id: 207, name: "Miếng Dán Kính Cường Lực Samsung", price: "334.000 VNĐ", quantity: 35 },
                { id: 208, name: "Bút Stylus Cho Samsung S24 ", price: "1.575.000 VNĐ", quantity: 45 },
                { id: 209, name: "Chân Quay Đế Đứng STAND", price: "185.000 VNĐ", quantity: 15 },
                { id: 210, name: "Sạc Nhanh 27W", price: "99.000 VNĐ", quantity: 55 },
                { id: 211, name: "Airpods Pro 4", price: "2.890.000 VNĐ", quantity: 20 }
            ];
            
            function renderTable() {
                $("#productTableBody").empty();
                products.forEach((product, index) => {
                    $("#productTableBody").append(
                        `<tr>
                            <td>${product.id}</td>
                            <td>${product.name}</td>
                            <td>${product.price}</td>
                            <td>${product.quantity}</td>
                            <td>
                                <button class='btn btn-warning btn-sm edit-btn' data-index='${index}'>Sửa</button>
                                <button class='btn btn-danger btn-sm delete-btn' data-index='${index}'>Xóa</button>
                            </td>
                        </tr>`
                    );
                });
            }
            
            renderTable();
            
            $(document).on("click", ".delete-btn", function () {
                const index = $(this).data("index");
                products.splice(index, 1);
                renderTable();
            });
            
            $(document).on("click", ".edit-btn", function () {
                const index = $(this).data("index");
                const newName = prompt("Nhập tên mới:", products[index].name);
                const newPrice = prompt("Nhập giá mới:", products[index].price);
                const newQuantity = prompt("Nhập số lượng mới:", products[index].quantity);
                
                if (newName && newPrice && newQuantity) {
                    products[index].name = newName;
                    products[index].price = newPrice;
                    products[index].quantity = newQuantity;
                    renderTable();
                }
            });
        });
    </script>
</body>
</html>
