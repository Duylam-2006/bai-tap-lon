<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ Hàng</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      /* Animation fade-in */
      .fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card {
        transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
      }
      .card:hover {
        transform: scale(1.03);
        box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.2);
      }
      .btn-tieptuc {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        font-weight: bold;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease-in-out;
      }
      .btn-tieptuc:hover {
        background: linear-gradient(135deg, #2575fc, #6a11cb);
        transform: scale(1.05);
        box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.3);
      }

      /* Button Thanh toán */
      .btn-thanh-toan {
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        color: white;
        font-weight: bold;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        box-shadow: 0px 4px 10px rgba(194, 158, 158, 0.2);
        transition: all 0.3s ease-in-out;
      }
      .btn-thanh-toan:hover {
        background: linear-gradient(135deg, #e62a09, #ff416c);
        transform: scale(1.05);
        box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="TrangHome.html">Phụ Kiện Điện Thoại</a>
      </div>
    </nav>

    <div class="container mt-4">
      <h1 class="text-center fade-in">🛒 Giỏ Hàng</h1>
      <div id="danhSachGioHang" class="mb-4 fade-in"></div>
    </div>
    <div class="text-center mt-3 d-flex justify-content-center gap-3">
      <button
        class="btn btn-thanh-toan btn-sm rounded-pill fade-in px-4 py-2"
        onclick="thanhToan()"
      >
        💳 Thanh Toán
      </button>
      <button
        class="btn btn-tieptuc btn-sm rounded-pill fade-in px-4 py-2"
        onclick="window.location.href='Trangsanpham.html';"
      >
        🛍️ Tiếp tục mua sắm
      </button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    function hienThiGioHang() {
        let gioHang = JSON.parse(localStorage.getItem("gioHang")) || [];
        let danhSach = "";
        let tongTien = 0;

        if (gioHang.length === 0) {
            danhSach = "<p class='text-center text-muted fade-in'>Giỏ hàng trống! 🛒</p>";
        } else {
            gioHang.forEach((sanPham, index) => {
                let thanhTien = sanPham.gia * sanPham.soLuong;
                tongTien += thanhTien;

                danhSach += `
                    <div class="card p-3 mb-2 fade-in">
                        <div class="row">
                            <div class="col-md-3 text-center">
                                <img src="${sanPham.anh}" class="img-fluid" style="max-height: 100px;" alt="${sanPham.ten}">
                            </div>
                            <div class="col-md-6">
                                <h5>${sanPham.ten}</h5>
                                <p>Giá: <strong>${sanPham.gia.toLocaleString()} VNĐ</strong></p>
                                <p>Số lượng: 
                                    <button class="btn btn-sm btn-outline-secondary" onclick="capNhatSoLuong(${index}, -1)">-</button>
                                    <strong>${sanPham.soLuong}</strong>
                                    <button class="btn btn-sm btn-outline-secondary" onclick="capNhatSoLuong(${index}, 1)">+</button>
                                </p>
                                <p>Thành tiền: <strong>${thanhTien.toLocaleString()} VNĐ</strong></p>
                            </div>
                            <div class="col-md-3 text-end">
                                <button class="btn btn-danger" onclick="xoaKhoiGio(${index})">🗑 Xóa</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            danhSach += `
                <div class="text-end mt-3 p-3 bg-light rounded">
                    <h4 class="text-danger">Tổng số tiền: <strong>${tongTien.toLocaleString()} VNĐ</strong></h4>
                </div>
            `;
        }

        document.getElementById("danhSachGioHang").innerHTML = danhSach;
    }
      function xoaKhoiGio(index) {
        let gioHang = JSON.parse(localStorage.getItem("gioHang")) || [];
        gioHang.splice(index, 1);
        localStorage.setItem("gioHang", JSON.stringify(gioHang));
        hienThiGioHang();
      }

      function thanhToan() {
        alert("🎉 Thanh toán thành công!");
        localStorage.removeItem("gioHang");
        hienThiGioHang();
      }

      $(document).ready(function () {
        hienThiGioHang();
      });
      
    </script>
  </body>
</html>
