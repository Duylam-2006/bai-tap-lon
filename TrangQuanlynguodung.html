<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body {
            display: flex;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #343a40;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background: #495057;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4>Admin</h4>
        <a href="Trangquanlysanpham.html">Quản lý sản phẩm</a>
        <a href="TrangQuanlydonhang.html">Quản lý đơn hàng</a>
        <a href="TrangQuanlynguodung.html">Quản lý người dùng</a>
        <a href="TrangDoanhthu.html">Thống kê doanh thu</a>
        <button type="button" class="btn btn-outline-secondary">
            <a href="TrangHome.html" style="color: inherit; text-decoration: none;">Về Trang Chủ</a>
        </button>
    </div>
    <div class="content">
        <h2 class="mb-4">Quản lý người dùng</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Email</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
            </tbody>
        </table>
    </div>
    
    <script>
        $(document).ready(function () {
            let users = [
                { id: 1, name: "Nguyễn Văn A", email: "a@example.com", status: "Hoạt động" },
                { id: 2, name: "Trần Thị B", email: "b@example.com", status: "Hoạt Động" },
                { id: 3, name: "Lê Văn C", email: "c@example.com", status: "Hoạt động" }
            ];
            
            function renderTable() {
                $("#userTableBody").empty();
                users.forEach((user, index) => {
                    $("#userTableBody").append(
                        `<tr>
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td>${user.status}</td>
                            <td>
                                <button class='btn btn-warning btn-sm edit-btn' data-index='${index}'>Sửa</button>
                                <button class='btn btn-danger btn-sm delete-btn' data-index='${index}'>Xóa</button>
                            </td>
                        </tr>`
                    );
                });
            }
            
            renderTable();
            
            $(document).on("click", ".edit-btn", function () {
                const index = $(this).data("index");
                const newName = prompt("Nhập tên mới:", users[index].name);
                const newStatus = prompt("Nhập trạng thái mới (Hoạt động/Khóa):", users[index].status);
                if (newName && newStatus) {
                    users[index].name = newName;
                    users[index].status = newStatus;
                    renderTable();
                }
            });
            
            $(document).on("click", ".delete-btn", function () {
                const index = $(this).data("index");
                if (confirm("Bạn có chắc chắn muốn xóa người dùng này?")) {
                    users.splice(index, 1);
                    renderTable();
                }
            });
        });
    </script>
</body>
</html>
