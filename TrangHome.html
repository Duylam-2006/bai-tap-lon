<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Phụ Kiện Điện Thoại</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        nav {
            background: #444;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .product {
            display: inline-block;
            border: 1px solid #e21111;
            padding: 10px;
            margin: 10px;
            width: 200px;
        }
        .product img {
            width: 100%;
            height: auto;
        }
        .cart-icon {
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
        }
        .cart-icon a {
            color: rgb(209, 53, 5);
            text-decoration: none;
        }
        .login {
            position: absolute;
            top: 15px;
            left: 20px;
        }
        .login a {
            color: rgb(60, 9, 241);
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Phụ Kiện Điện Thoại</h1>
        <div class="cart-icon" onclick="goToCart()">
            <a href="Tranggiohang.html" class="btn btn-light">Giỏ Hàng (<span id="soLuongGio">0</span>)</a>
        </div>
        <div class="login">
            <button type="button" class="btn btn-outline-primary"><a href="Trangdangnhap.html">Đăng Nhập</a></button>
        </div>
    </header>
    <nav>
        <a href="TrangHome.html">Trang Chủ</a>
        <a href="Trangsanpham.html">Sản Phẩm</a>
        <a href="TrangDoanhthu.html">Admin</a>
    </nav>
    <div class="container">
        <h2>Sản Phẩm Nổi Bật</h2>
        <div class="product">
            <img src="2.webp" alt="Airpods Pro 4">
            <p>Airpods Pro 4</p>
            <p>2.890.000đ</p>
            <button onclick="addToCart('Airpods Pro 4', 2890000, '1.webp')">Thêm Giỏ Hàng</button>
        </div>
        <div class="product">
            <img src="3.webp" alt="Sạc Nhanh 27W">
            <p>Sạc Nhanh 27W</p>
            <p>99.000đ</p>
            <button onclick="addToCart('Sạc Nhanh 27W', 99000, '1.webp')">Thêm Giỏ Hàng</button>
        </div>
        <div class="product">
            <img src="6.webp" alt="Tai Nghe Chùm Đầu">
            <p>Tai Nghe Chùm Đầu</p>
            <p>425.000đ</p>
            <button onclick="addToCart('Tai Nghe Chùm Đầu', 425000, '1.webp')">Thêm Giỏ Hàng</button>
        </div>
    </div>
    <script>
        function addToCart(productName, productPrice, productImage) {
            let cart = JSON.parse(localStorage.getItem("gioHang")) || [];

            let index = cart.findIndex(item => item.ten === productName);
            if (index !== -1) {
                cart[index].soLuong++;
            } else {
                cart.push({
                    ten: productName,
                    gia: productPrice,
                    anh: productImage,
                    soLuong: 1
                });
            }

            localStorage.setItem("gioHang", JSON.stringify(cart));

            let cartCount = cart.reduce((sum, item) => sum + item.soLuong, 0);
            document.getElementById("soLuongGio").textContent = cartCount;

            alert(`Đã thêm "${productName}" vào giỏ hàng!`);
        }

        function goToCart() {
            window.location.href = "Tranggiohang.html";
        }

        window.onload = function() {
            let gioHang = JSON.parse(localStorage.getItem("gioHang")) || [];
            let cartCount = gioHang.reduce((sum, item) => sum + item.soLuong, 0);
            document.getElementById("soLuongGio").textContent = cartCount;
        };
    </script>
</body>
</html>
