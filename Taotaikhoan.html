<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo Tài Khoản</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script>
      function registerAccount(event) {
        event.preventDefault();
        var username = document.getElementById("username").value.trim();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value.trim();
        var confirmPassword = document
          .getElementById("confirmPassword")
          .value.trim();

        if (!username || !email || !password || !confirmPassword) {
          alert("Vui lòng điền đầy đủ thông tin!");
          return;
        }

        if (password !== confirmPassword) {
          alert("Mật khẩu xác nhận không khớp!");
          return;
        }

        alert("Đăng ký thành công!");
        window.location.href = "Trangdangnhap.html"; 
      }
    </script>
    <style>
      body {
        background-color: #f8f9fa;
      }
      .register-box {
        width: 350px;
        margin: auto;
        margin-top: 50px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }
      .btn-register {
        border: 2px solid red; 
        color: black; 
        font-weight: bold;
        background-color: white; 
      }
      .btn-register:hover {
        background-color: #ffcccc; 
        color: black; 
      }
    </style>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <div class="register-box">
      <h2 class="text-center">Tạo Tài Khoản</h2>
      <form onsubmit="registerAccount(event)">
        <div class="mb-3">
          <label class="form-label">Tên đăng nhập</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Nhập tên đăng nhập"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Nhập email"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Nhập mật khẩu"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Xác nhận mật khẩu</label>
          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            placeholder="Nhập lại mật khẩu"
          />
        </div>
        <button type="submit" class="btn btn-register w-100">Đăng Ký</button>
        <div class="text-center mt-3">
          <a href="Trangdangnhap.html">Đã có tài khoản? Đăng nhập</a>
        </div>
      </form>
    </div>
  </body>
</html>
